<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUET ME '25 Academic Resource Portal</title>
    <style>
        /* মেইন কন্টেইনার যাতে সবগুলোকে আলাদা রাখে */
.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

/* প্রতিটি সেকশনকে আলাদা করার জন্য */
.section-wrapper {
    margin-bottom: 50px; /* Section A এবং B এর মাঝে জায়গা তৈরি করবে */
    width: 100%;
}

.section-title {
    color: #4d96ff;
    font-size: 1.5rem;
    margin: 30px 0 20px 0;
    text-transform: uppercase;
    border-bottom: 2px solid #4d96ff;
    display: inline-block;
    padding-bottom: 5px;
}

/* গ্রিড লেআউট ফিক্স */
.family-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
    width: 100%;
}
        :root {
            --bg-color: #0b0c10;
            --accent-purple: #8a2be2;
            --accent-blue: #4d96ff;
            --text-main: #c5c6c7;
            --text-bright: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; }

        #mechanical-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        header { text-align: center; padding: 50px 20px; }
        .dept-tag { display: inline-block; border: 2px solid var(--accent-purple); color: var(--text-bright); padding: 6px 16px; font-weight: bold; border-radius: 4px; margin-bottom: 20px; background: rgba(138, 43, 226, 0.1); }
        
        .search-container { max-width: 600px; margin: 20px auto; padding: 0 20px; }
        .search-input { width: 100%; background: rgba(31, 40, 51, 0.7); border: 1px solid #3a4b61; padding: 12px 20px; border-radius: 30px; color: var(--text-bright); outline: none; }

        .section-title { text-align: center; color: var(--accent-blue); margin: 50px 0 20px 0; font-size: 1.8rem; text-transform: uppercase; }

        .family-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; padding: 0 30px 60px 30px; }
        
        .student-card { background: rgba(31, 40, 51, 0.6); border: 1px solid #2a3747; border-radius: 12px; padding: 20px; text-align: center; transition: 0.3s; }
        .student-card:hover { transform: translateY(-5px); border-color: var(--accent-purple); background: rgba(31, 40, 51, 0.9); }
        
        .avatar-circle { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--accent-purple); display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <canvas id="mechanical-bg"></canvas>

    <header>
        <div class="dept-tag">RUET ME'25</div>
        <h1>Academic Resource Portal</h1>
    </header>

    <div class="search-container">
        <input type="text" id="studentSearch" class="search-input" placeholder="Search by name or roll..." onkeyup="filterStudents()">
    </div>

    <div class="section-title">Section A</div>
    <div class="family-grid" id="sectionA-grid"></div>

    <div class="section-title">Section B</div>
    <div class="family-grid" id="sectionB-grid"></div>

    <div class="section-title">Section C</div>
    <div class="family-grid" id="sectionC-grid"></div>

    <script>
        const students = [
            { roll: "2502001", name: "ATIQ FAIYAZ RAHMAN", sec: "A" },
            { roll: "2502061", name: "S. M. IFTEKHAR ALAM TANVIR", sec: "B" },
            { roll: "2502121", name: "RIJWAN AHMAD", sec: "C" }
            // আপনি আপনার বাকি লিস্ট এখানে বসিয়ে দিন
        ];

        function displayStudents(data) {
            const grids = { 'A': document.getElementById('sectionA-grid'), 'B': document.getElementById('sectionB-grid'), 'C': document.getElementById('sectionC-grid') };
            Object.values(grids).forEach(g => g.innerHTML = '');
            data.forEach(s => {
                const card = document.createElement('div');
                card.className = 'student-card';
                card.innerHTML = `<div class="avatar-circle">${s.name.charAt(0)}</div><div class="name">${s.name}</div><div class="roll">Roll: ${s.roll}</div>`;
                grids[s.sec].appendChild(card);
            });
        }

        displayStudents(students);

        // Background Animation Canvas
        const canvas = document.getElementById('mechanical-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // এখানে আপনার জেট এবং কারের ড্রয়িং লজিক থাকবে যা আমি আগের কোড থেকেই রেখেছি
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
