<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUET ME '25 Academic Resource Portal</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --accent-purple: #8a2be2;
            --accent-blue: #4d96ff;
            --text-main: #c5c6c7;
            --text-bright: #ffffff;
            --glow-purple: rgba(138, 43, 226, 0.6);
            --glow-blue: rgba(77, 150, 255, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            background-image: linear-gradient(0deg, transparent 24%, rgba(31, 40, 51, 0.15) 25%, rgba(31, 40, 51, 0.15) 26%, transparent 27%, transparent 74%, rgba(31, 40, 51, 0.15) 75%, rgba(31, 40, 51, 0.15) 76%, transparent 77%), linear-gradient(90deg, transparent 24%, rgba(31, 40, 51, 0.15) 25%, rgba(31, 40, 51, 0.15) 26%, transparent 27%, transparent 74%, rgba(31, 40, 51, 0.15) 75%, rgba(31, 40, 51, 0.15) 76%, transparent 77%);
            background-size: 50px 50px;
        }

        /* মেকানিক্যাল ব্যাকগ্রাউন্ড ক্যানভাস সিএসএস */
        #mechanical-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* কন্টেন্টের পেছনে রাখার জন্য */
            background: #0b0c10; 
            pointer-events: none; /* যেন বাটনে বা কার্ডে ক্লিক করতে সমস্যা না হয় */
        }

        /* কার্ডের ব্যাকগ্রাউন্ড হালকা ট্রান্সপারেন্ট করা যেন পেছনের ডিভাইসগুলো দেখা যায় */
        .family-grid .student-card {
            background: rgba(31, 40, 51, 0.65) !important;
            backdrop-filter: blur(8px); /* গ্লাস-মরফিজম ইফেক্ট */
        }

        header {
            text-align: center;
            padding: 40px 20px;
            position: relative;
        }

        .dept-tag {
            display: inline-block;
            border: 2px solid var(--accent-purple);
            color: var(--text-bright);
            padding: 6px 16px;
            font-weight: bold;
            letter-spacing: 2px;
            border-radius: 4px;
            box-shadow: 0 0 10px var(--glow-purple);
            margin-bottom: 20px;
            background: rgba(138, 43, 226, 0.1);
        }

        h1 {
            color: var(--text-bright);
            font-size: 2.2rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #8f9499;
        }

        /* Search Section */
        .search-container {
            max-width: 600px;
            margin: 30px auto;
            display: flex;
            gap: 10px;
            padding: 0 20px;
        }

        .search-input {
            flex: 1;
            background: rgba(31, 40, 51, 0.7);
            border: 1px solid #3a4b61;
            padding: 12px 20px;
            border-radius: 30px;
            color: var(--text-bright);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 8px var(--glow-blue);
        }

        /* Navigation Tabs */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .tab-btn {
            background: rgba(31, 40, 51, 0.5);
            border: 1px solid #3a4b61;
            color: var(--text-main);
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .tab-btn:hover {
            border-color: var(--text-main);
            color: var(--text-bright);
        }

        .tab-btn.active {
            background: transparent;
            border-color: var(--accent-blue);
            color: var(--text-bright);
            box-shadow: 0 0 12px var(--glow-blue);
        }

        /* Section Organization */
        .section-title {
            text-align: center;
            color: var(--accent-blue);
            margin: 40px 0 20px 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 2px;
            background: var(--accent-blue);
            margin: 8px auto 0 auto;
            box-shadow: 0 0 6px var(--glow-blue);
        }

        /* Responsive Grid Grid */
        .family-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
            padding: 0 30px 60px 30px;
        }

        /* Student Card styling */
        .student-card {
            background: rgba(31, 40, 51, 0.4);
            border: 1px solid #2a3747;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .student-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-purple);
            box-shadow: 0 5px 20px rgba(138, 43, 226, 0.15);
            background: rgba(31, 40, 51, 0.7);
        }

        .avatar-circle {
            width: 60px;
            height: 60px;
            border-radius: 50px;
            border: 2px solid var(--accent-purple);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--text-bright);
            background: rgba(138, 43, 226, 0.05);
            margin-bottom: 18px;
            box-shadow: 0 0 5px var(--glow-purple);
        }

        .student-name {
            color: var(--text-bright);
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 6px;
            min-height: 2.2rem;
            display: flex;
            align-items: center;
            text-align: center;
        }

        .student-roll {
            font-size: 0.85rem;
            color: #8f9499;
            margin-bottom: 4px;
        }

        .student-section {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-blue);
        }

        /* Footer styling */
        footer {
            border-top: 1px solid #1f2833;
            padding: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: #62676b;
            background: #07080a;
            position: relative;
        }

        .contact-btn {
            position: absolute;
            bottom: 25px;
            right: 30px;
            background: var(--accent-blue);
            color: var(--text-bright);
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            box-shadow: 0 0 10px var(--glow-blue);
            transition: all 0.3s ease;
        }

        .contact-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--glow-blue);
        }

        @media (max-width: 768px) {
            .contact-btn {
                position: static;
                display: inline-block;
                margin-top: 15px;
            }
        }
    </style>
</head>

            { roll: "2502180", name: "MD. JAHURUL ISLAM TUSHAR", sec: "C" }
        ];

        // Helper function to extract initials for avatar circles
        function getInitials(name) {
            let clean = name.replace(/MD\.|MST\./gi, '').trim();
            let tokens = clean.split(' ').filter(t => t.length > 0);
            if(tokens.length >= 2) {
                return (tokens[0][0] + tokens[1][0]).toUpperCase();
            } else if (tokens.length === 1) {
                return tokens[0].substring(0,2).toUpperCase();
            }
            return "ME";
        }

        // Render card layout
        function displayStudents(data) {
            const gridA = document.getElementById('sectionA-grid');
            const gridB = document.getElementById('sectionB-grid');
            const gridC = document.getElementById('sectionC-grid');

            gridA.innerHTML = '';
            gridB.innerHTML = '';
            gridC.innerHTML = '';

            data.forEach(student => {
                const card = document.createElement('div');
                card.className = 'student-card';
                card.innerHTML = `
                    <div class="avatar-circle">${getInitials(student.name)}</div>
                    <div class="student-name">${student.name}</div>
                    <div class="student-roll">Roll: ${student.roll}</div>
                    <div class="student-section">Section ${student.sec}</div>
                `;

                if(student.sec === 'A') gridA.appendChild(card);
                if(student.sec === 'B') gridB.appendChild(card);
                if(student.sec === 'C') gridC.appendChild(card);
            });
        }

        // Handle dynamic real-time filtering
        function filterStudents() {
            const query = document.getElementById('studentSearch').value.toLowerCase();
            const filtered = students.filter(student => 
                student.name.toLowerCase().includes(query) || 
                student.roll.includes(query)
            );
            displayStudents(filtered);
        }

        // Initial paint execution
        displayStudents(students);


        // ==========================================
        //  মেকানিক্যাল এনিমেশন ক্যানভাস লজিক 
        // ==========================================
        const canvas = document.getElementById('mechanical-bg');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const deviceTypes = ['car', 'jet', 'ship', 'rocket', 'gear'];

        class MechanicalDevice {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height; 
            }

            reset() {
                this.x = -100; 
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 30 + 20; 
                this.speed = Math.random() * 1 + 0.5; 
                this.type = deviceTypes[Math.floor(Math.random() * deviceTypes.length)];
                this.opacity = Math.random() * 0.15 + 0.05; 
            }

            update() {
                this.x += this.speed; 
                if (this.x > canvas.width + 100) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.fillStyle = `rgba(102, 252, 241, ${this.opacity})`; 
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#66fcf1';

                ctx.beginPath();
                if (this.type === 'car') {
                    ctx.fillRect(0, 10, this.size, this.size / 2.5);
                    ctx.fillRect(this.size * 0.2, 0, this.size * 0.5, this.size / 2.5);
                    ctx.fillStyle = `rgba(31, 40, 51, ${this.opacity})`;
                    ctx.arc(this.size * 0.25, 10 + this.size / 2.5, 4, 0, Math.PI * 2);
                    ctx.arc(this.size * 0.75, 10 + this.size / 2.5, 4, 0, Math.PI * 2);
                    ctx.fill();
                } 
                else if (this.type === 'jet') {
                    ctx.moveTo(this.size, 0);
                    ctx.lineTo(0, -this.size/3);
                    ctx.lineTo(this.size*0.2, -this.size/1.5);
                    ctx.lineTo(this.size*0.4, -this.size/3);
                    ctx.lineTo(0, 0);
                    ctx.lineTo(this.size*0.4, this.size/3);
                    ctx.lineTo(this.size*0.2, this.size/1.5);
                    ctx.lineTo(0, this.size/3);
                    ctx.closePath();
                    ctx.fill();
                } 
                else if (this.type === 'ship') {
                    ctx.moveTo(0, 0);
                    ctx.lineTo(this.size * 0.8, 0);
                    ctx.lineTo(this.size, -this.size * 0.3);
                    ctx.lineTo(this.size * 0.9, -this.size * 0.5);
                    ctx.lineTo(this.size * 0.2, -this.size * 0.5);
                    ctx.closePath();
                    ctx.fill();
                } 
                else if (this.type === 'rocket') {
                    ctx.arc(0, 0, this.size/4, Math.PI/2, -Math.PI/2, true);
                    ctx.lineTo(-this.size, -this.size/4);
                    ctx.lineTo(-this.size - 5, -this.size/2);
                    ctx.lineTo(-this.size + 5, 0);
                    ctx.lineTo(-this.size - 5, this.size/2);
                    ctx.lineTo(-this.size, this.size/4);
                    ctx.closePath();
                    ctx.fill();
                }
                else if (this.type === 'gear') {
                    ctx.rotate((this.x * 0.02)); 
                    for (let i = 0; i < 8; i++) {
                        ctx.rotate(Math.PI / 4);
                        ctx.fillRect(-this.size/8, -this.size/2, this.size/4, this.size/2);
                    }
                    ctx.arc(0, 0, this.size/3, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        const devicesArray = [];
        const numberOfDevices = 15;

        for (let i = 0; i < numberOfDevices; i++) {
            devicesArray.push(new MechanicalDevice());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            devicesArray.forEach(device => {
                device.update();
                device.draw();
            });
            
            requestAnimationFrame(animate);
        }

        animate();
    </script>
