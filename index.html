<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUET ME '25 Academic Resource Portal</title>
    <style>
        :root {
            --bg-color: #05030a;
            --card-bg: rgba(13, 10, 24, 0.7);
            --primary-glow: #7451f7;
            --accent-blue: #38b6ff;
            --text-main: #ffffff;
            --text-muted: #8f8aa7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image: 
                radial-gradient(circle at 50% 10%, #170d2e 0%, #05030a 60%),
                radial-gradient(circle at 10% 80%, #0a1128 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .badge {
            background: rgba(108, 92, 231, 0.1);
            border: 2px solid var(--primary-glow);
            color: var(--text-main);
            padding: 8px 24px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(116, 81, 247, 0.4);
            display: inline-block;
        }

        header h1 {
            margin: 20px 0 5px;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* KUET Dynamic Search Bar Grid */
        .search-container {
            display: flex;
            justify-content: center;
            max-width: 600px;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 4px;
        }

        .search-input {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 20px;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }

        .search-input::placeholder {
            color: #524f66;
        }

        .search-btn {
            background: var(--primary-glow);
            border: none;
            color: white;
            padding: 0 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background: #5f3bd4;
        }

        .tabs
