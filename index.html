    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #09090b;
            --card-bg: #111118;
            --accent: #6c5ce7;
            --text: #ffffff;
            --border: #2d2d3a;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; text-align: center; }
        
        h1 { margin-bottom: 5px; }
        
        .search-container { margin: 30px 0; display: flex; justify-content: center; gap: 10px; }
        .search-box { width: 60%; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--border); background: var(--card-bg); color: white; }
        .search-btn { padding: 10px 25px; border-radius: 25px; border: none; background: var(--accent); color: white; cursor: pointer; }

        .nav-tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .tab-btn { padding: 10px 25px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-bg); color: white; cursor: pointer; }
        .tab-btn.active { border-color: var(--accent); }

        .family-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; text-align: left; }
        .student-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
        .avatar { width: 50px; height: 50px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 10px; }
        .profile-btn { display: block; margin-top: 15px; padding: 8px; text-align: center; background: var(--accent); color: white; text-decoration: none; border-radius: 5px; }
        
        .content-section { display: none; }
    </style>
</head>

    const grid = document.getElementById('studentsGrid');
    grid.innerHTML = students.map(s => `

            </a>
        </div>
    `).join('');
}
    ];

    function generateCards() {
        const grid = document.getElementById('studentsGrid');
        grid.innerHTML = students.map(s => `
            <div class="student-card">
                <div class="avatar">${s.name.split(' ').map(n=>n[0]).join('').slice(0,2)}</div>
                <strong>${s.name}</strong>
                <p style="font-size: 0.9em; color: #888;">Roll: ${s.roll}</p>
                <a href="#" class="profile-btn"><i class="fab fa-facebook"></i> Visit Profile</a>
            </div>
        `).join('');
    }
    
    function filter() {
        const val = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.student-card').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
    }
