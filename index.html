<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUET ME '25 Academic Resource Portal</title>
    <style>
        :root {
            --bg-color: #05030a;
            --card-bg: rgba(13, 10, 24, 0.7);
            --primary-glow: #7451f7;
            --accent-blue: #38b6ff;
            --text-main: #ffffff;
            --text-muted: #8f8aa7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image: 
                radial-gradient(circle at 50% 10%, #170d2e 0%, #05030a 60%),
                radial-gradient(circle at 10% 80%, #0a1128 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .badge {
            background: rgba(108, 92, 231, 0.1);
            border: 2px solid var(--primary-glow);
            color: var(--text-main);
            padding: 8px 24px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(116, 81, 247, 0.4);
            display: inline-block;
        }

        header h1 {
            margin: 20px 0 5px;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Search Bar Layout */
        .search-container {
            display: flex;
            justify-content: center;
            max-width: 600px;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 4px;
        }

        .search-input {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 20px;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }

        .search-input::placeholder {
            color: #524f66;
        }

        .search-btn {
            background: var(--primary-glow);
            border: none;
            color: white;
            padding: 0 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background: #5f3bd4;
        }

        /* Navigation Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #a2a0b3;
            font-size: 0.95rem;
            cursor: pointer;
            padding: 12px 28px;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .tab-btn.active {
            background: rgba(116, 81, 247, 0.15);
            color: #ffffff;
            border-color: var(--primary-glow);
            box-shadow: 0 0 20px rgba(116, 81, 247, 0.4);
        }

        .content {
            display: none;
        }

        .content.active {
            display: block;
        }

        /* Notices & Resource Cards */
        .card {
            background: var(--card-bg);
            border-left: 4px solid var(--primary-glow);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 0 12px 12px 0;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            background: rgba(20, 16, 36, 0.7);
        }

        .card .date {
            color: #636e72;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .card h3 {
            margin: 0 0 15px 0;
            font-size: 1.25rem;
            font-weight: 600;
            color: #e2e1e9;
        }

        .download-link {
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .download-link:hover {
            text-decoration: underline;
        }

        /* Students Family Grid CSS Layout */
        .family-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .student-card {
            background: rgba(15, 12, 28, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .student-card:hover {
            transform: translateY(-5px);
            border-color: rgba(116, 81, 247, 0.3);
            box-shadow: 0 10px 25px rgba(116, 81, 247, 0.15);
        }

        .avatar-container {
            width: 75px;
            height: 75px;
            margin: 0 auto 15px;
            border-radius: 50%;
            background: rgba(116, 81, 247, 0.1);
            border: 2px solid var(--primary-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(116, 81, 247, 0.2);
            position: relative;
        }
        
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .student-card h3 {
            font-size: 1.15rem;
            margin: 0 0 6px 0;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .student-card .roll {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0 0 4px 0;
        }

        .student-card .section-badge {
            display: inline-block;
            background: rgba(56, 182, 255, 0.1);
            color: var(--accent-blue);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .student-card .cell {
            font-size: 0.85rem;
            color: #1dd1a1;
            margin: 0 0 15px 0;
        }

        .visit-btn {
            display: block;
            background: #1a73e8;
            color: white;
            text-decoration: none;
            padding: 8px 0;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background 0.2s;
        }

        .visit-btn:hover {
            background: #1557b0;
        }
    </style>
</head>
